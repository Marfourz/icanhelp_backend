services:
  traefik:
    image: traefik:v3.3
    ports:
      - "80:80"
      - "8080:8080"   # dashboard
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/traefik.local.yml:/traefik.yml:ro
    networks:
      - proxy

  web:
    env_file:
      - .env.local
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.skillou-api.rule=Host(`api.skillou.local`)"
      - "traefik.http.routers.skillou-api.entrypoints=web"
      - "traefik.http.services.skillou-api.loadbalancer.server.port=8000"

  db:
    env_file:
      - .env.local

networks:
  proxy:
    name: proxy
    driver: bridge
