<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirmation d'email — Skillou</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .card {
            background: white;
            border-radius: 16px;
            padding: 40px;
            max-width: 420px;
            width: 100%;
            box-shadow: 0 4px 24px rgba(0,0,0,0.08);
            text-align: center;
        }
        .logo { font-size: 24px; font-weight: 700; color: #FE8235; margin-bottom: 24px; }
        .icon { font-size: 48px; margin-bottom: 16px; }
        h1 { font-size: 20px; color: #1a1a1a; margin-bottom: 12px; }
        p { color: #666; font-size: 15px; line-height: 1.6; margin-bottom: 24px; }
        form button {
            padding: 14px 32px;
            background: #FE8235;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
        form button:hover { background: #e5712a; }
        .error { color: #e53e3e; font-size: 14px; }
    </style>
</head>
<body>
<div class="card">
    <div class="logo">Skillou</div>

    {% if confirmation %}
        <div class="icon">📧</div>
        <h1>Confirmer votre email</h1>
        <p>Cliquez sur le bouton ci-dessous pour confirmer l'adresse <strong>{{ confirmation.email_address.email }}</strong>.</p>
        <form method="POST">
            {% csrf_token %}
            <button type="submit">Confirmer mon email</button>
        </form>
    {% else %}
        <div class="icon">❌</div>
        <h1>Lien invalide</h1>
        <p class="error">Ce lien de confirmation est invalide ou a expiré.</p>
    {% endif %}
</div>
</body>
</html>
